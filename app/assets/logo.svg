<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="54" fill="#059669" opacity="0.1"/>

  <!-- Leaf / drop shape — main icon -->
  <path d="M60 18 C60 18 32 44 32 66 C32 82.4 44.6 95 60 95 C75.4 95 88 82.4 88 66 C88 44 60 18 60 18Z"
        fill="#059669"/>

  <!-- Inner highlight on drop -->
  <path d="M60 30 C60 30 44 50 44 66 C44 74.8 51.2 82 60 82"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Progress arc — amber, indicates monitoring -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#F59E0B" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="144 145"
          transform="rotate(-90 60 60)"/>

  <!-- Check mark inside drop -->
  <path d="M48 65 L57 74 L74 53"
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

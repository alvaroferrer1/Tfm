name: mermaops_app
description: "MermaOps — Gestión inteligente de merma alimentaria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Auth + DB
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Barcode scanner
  mobile_scanner: ^6.0.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # HTTP client (FastAPI backend)
  http: ^1.2.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

  # PDF download & sharing
  path_provider: ^2.1.4
  share_plus: ^10.0.0

  # Local notifications (alertas en tiempo real sin FCM)
  flutter_local_notifications: ^18.0.0

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/logo.svg
